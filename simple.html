<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>柏伸聽寫 - 精簡模擬版</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; text-align: center; padding: 20px; background-color: #fdfdfd; color: #2c3e50; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: inline-block; width: 95%; max-width: 400px; min-height: 200px; border: 1px solid #eee; }
        .top-bar { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 14px; color: #95a5a6; }
        .stop-link { color: #95a5a6; cursor: pointer; text-decoration: underline; }
        select { font-size: 18px; padding: 12px; border-radius: 8px; width: 95%; margin: 20px 0; border: 1px solid #ddd; background: #fff; }
        .bopomofo { font-size: 80px; font-weight: bold; margin: 40px 0; min-height: 100px; color: #34495e; letter-spacing: 5px; }
        
        button { font-size: 20px; padding: 18px; margin: 10px 0; cursor: pointer; border-radius: 15px; border: none; background: #3498db; color: white; width: 100%; box-shadow: 0 4px 0 #2980b9; }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #2980b9; }
        .next-btn { background: #27ae60; box-shadow: 0 4px 0 #219150; margin-top: 30px; }
        
        #loader { font-weight: bold; color: #3498db; margin-top: 50px; }
        h2 { color: #34495e; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <div id="loader">📝 正在準備試卷...</div>
        
        <div id="setupArea" style="display:none;">
            <h2>📝 聽寫模擬考</h2>
            <p style="color:gray; font-size:14px;">此模式不提供答案顯示</p>
            <select id="lessonSelect"></select><br>
            <button onclick="startQuiz()">開始考試</button>
        </div>

        <div id="quizArea" style="display:none;">
            <div class="top-bar">
                <div id="status">進度：-- / --</div>
                <div class="stop-link" onclick="location.reload()">🛑 結束</div>
            </div>
            
            <div class="bopomofo" id="bpmfDisplay">---</div>
            
            <button onclick="speak()">🔊 重聽一次</button>
            <button class="next-btn" onclick="showNext()">下一題 ➔</button>
        </div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR8h56wLvxnA4_Xr7oLo_iO8WycSoz5Mw7m9fJrIw2R6JwhGP5bvAmnPG9yOoYg9WSrnliwmA8wbXhR/pub?output=csv";
        
        let allData = [];
        let currentPool = [];
        let index = -1;
        let preferredVoice = null;

        // 優選語音包選取
        function loadVoices() {
            const voices = window.speechSynthesis.getVoices();
            preferredVoice = voices.find(v => v.name.includes("Google") && v.lang.includes("zh-TW")) ||
                             voices.find(v => v.name.includes("Hanhan")) ||
                             voices.find(v => v.lang.includes("zh-TW"));
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;

        async function init() {
            try {
                const response = await fetch(`${CSV_URL}&cb=${Date.now()}`);
                const dataText = await response.text();
                const rows = dataText.split(/\r?\n/).filter(r => r.trim() !== "");
                
                allData = rows.slice(1).map((line) => {
                    const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return {
                        lesson: (cols[0] || "").replace(/"/g,'').trim(),
                        word: (cols[1] || "").replace(/"/g,'').trim(),
                        bpmf: (cols[2] || "").replace(/"/g,'').trim()
                    };
                }).filter(item => item.word && item.lesson);

                const lessons = [...new Set(allData.map(d => d.lesson))];
                const select = document.getElementById('lessonSelect');
                lessons.forEach(l => {
                    const opt = document.createElement('option');
                    opt.value = opt.textContent = l;
                    select.appendChild(opt);
                });

                document.getElementById('loader').style.display = 'none';
                document.getElementById('setupArea').style.display = 'block';
                loadVoices();
            } catch (err) {
                document.getElementById('loader').innerHTML = "❌ 載入失敗";
            }
        }

        function startQuiz() {
            const selectedLesson = document.getElementById('lessonSelect').value;
            currentPool = allData.filter(d => d.lesson === selectedLesson);
            currentPool.sort(() => Math.random() - 0.5);

            window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
            document.getElementById('setupArea').style.display = 'none';
            document.getElementById('quizArea').style.display = 'block';
            index = -1;
            showNext();
        }

        function speak() {
            if (index < 0 || index >= currentPool.length) return;
            window.speechSynthesis.cancel();
            setTimeout(() => {
                const utterance = new SpeechSynthesisUtterance(currentPool[index].bpmf);
                if (preferredVoice) utterance.voice = preferredVoice;
                utterance.lang = 'zh-TW';
                utterance.rate = 0.8;
                window.speechSynthesis.speak(utterance);
            }, 50);
        }

        function showNext() {
            index++;
            if (index < currentPool.length) {
                document.getElementById('bpmfDisplay').innerText = currentPool[index].bpmf;
                document.getElementById('status').innerText = `剩餘：${currentPool.length - index} 題`;
                speak();
            } else {
                alert("模擬考結束！請家長批改紙本。");
                location.reload();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
