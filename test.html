<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>柏伸詞語智慧複習 v2.2.2</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; text-align: center; padding: 20px; background-color: #f0f4f8; color: #2c3e50; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: inline-block; width: 95%; max-width: 500px; text-align: left; box-sizing: border-box; }
        
        /* 1. 進度條樣式 */
        #progressContainer { width: 100%; background-color: #eee; border-radius: 10px; margin: 20px 0; display: none; }
        #progressBar { width: 0%; height: 10px; background-color: #3498db; border-radius: 10px; transition: width 0.4s ease; }
        
        .setting-item { margin: 15px 0; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; margin-top: 5px; }
        .primary-btn { width: 100%; padding: 18px; margin-top: 10px; font-size: 18px; cursor: pointer; border-radius: 12px; border: none; background: #3498db; color: white; font-weight: bold; }
        
        /* 2. 選項樣式：增加「選中」狀態 */
        .quiz-option { width: 100%; padding: 16px; margin: 10px 0; border: 2px solid #ecf0f1; border-radius: 12px; background: white; font-size: 19px; cursor: pointer; text-align: left; outline: none; }
        .quiz-option.selected { border-color: #3498db; background-color: #ebf5fb; box-shadow: 0 0 10px rgba(52,152,219,0.3); }
        .correct { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }
        
        .meaning-box { background: #fff9db; padding: 20px; border-radius: 15px; font-size: 22px; line-height: 1.6; border-left: 10px solid #f1c40f; margin: 20px 0; min-height: 60px; }
        .sync-banner { background: #34495e; color: white; padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 15px; font-size: 14px; }
        .report-list { max-height: 400px; overflow-y: auto; border: 1px solid #eee; padding: 10px; border-radius: 10px; background: #fafafa; }
        .report-item { padding: 12px; border-bottom: 1px solid #eee; font-size: 15px; }
    </style>
</head>
<body>

<div class="card">
    <div id="loaderArea">
        <h3 id="loaderStatus">📡 正在連接資料庫...</h3>
        <div id="progressContainer" style="display:block;"><div id="progressBar"></div></div>
    </div>

    <div id="setupArea" style="display:none;">
        <h2 style="text-align:center; margin-top:0;">🧠 智慧測驗設定</h2>
        <div class="setting-item">
            <label>測驗題數：</label>
            <select id="quizCount"><option value="10">10 題</option><option value="20">20 題</option><option value="30">30 題</option></select>
        </div>
        <button class="primary-btn" style="background:#e74c3c;" onclick="prepareApp('hard')">🔥 地獄挑戰</button>
        <button class="primary-btn" style="background:#3498db;" onclick="prepareApp('mix')">⚖️ 智慧練習</button>
        <button class="primary-btn" style="background:#27ae60;" onclick="prepareApp('review')">🔄 溫故知新</button>
    </div>

    <div id="gameArea" style="display:none;">
        <div id="meaningDisplay" class="meaning-box"></div>
        <div id="optionsGroup"></div>
        <button id="nextBtn" class="primary-btn" style="background:#2c3e50;" onclick="handleNext()">確認並下一題 ➔</button>
    </div>

    <div id="reportArea" style="display:none;">
        <div id="syncStatusBanner" class="sync-banner">🔄 同步中...</div>
        <div id="reportList" class="report-list"></div>
        <button class="primary-btn" onclick="location.reload()">返回首頁</button>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwdIKdIUNvTrWUK30PfzmsKl4Rtd_t1pID7dk8DcYLON_sCxRoH1f5s3h0L3coYHa3A/exec"; 
    let rawData = [], pool = [], currentIndex = -1, batchLog = [], isSyncing = false;
    let selectedWord = null; // 暫存目前選中的答案

    window.onbeforeunload = () => isSyncing ? "同步中，請勿關閉" : null;

    // 模擬進度條並載入
    async function init() {
        const bar = document.getElementById('progressBar');
        const status = document.getElementById('loaderStatus');
        
        try {
            bar.style.width = "30%";
            status.innerText = "📥 下載詞庫中...";
            
            const res = await fetch(`${GAS_URL}?action=read&cb=${Date.now()}`);
            bar.style.width = "70%";
            
            const json = await res.json();
            rawData = json.data;
            
            bar.style.width = "100%";
            setTimeout(() => {
                document.getElementById('loaderArea').style.display = 'none';
                document.getElementById('setupArea').style.display = 'block';
            }, 400);
        } catch (e) {
            status.innerText = "❌ 連線超時，請重整頁面";
        }
    }

    function prepareApp(mode) {
        const totalTarget = parseInt(document.getElementById('quizCount').value);
        let red = rawData.filter(d => d.score <= 3).sort(() => Math.random() - 0.5);
        let yellow = rawData.filter(d => d.score >= 4 && d.score <= 7).sort(() => Math.random() - 0.5);
        let green = rawData.filter(d => d.score >= 8).sort(() => Math.random() - 0.5);
        
        pool = []; // 簡化邏輯，快速填充
        const all = [...red, ...yellow, ...green].sort(() => Math.random() - 0.5);
        pool = all.slice(0, totalTarget);

        document.getElementById('setupArea').style.display = 'none';
        document.getElementById('gameArea').style.display = 'block';
        nextQuestion();
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex >= pool.length) { showReportAndSync(); return; }
        
        selectedWord = null; // 重置選擇
        const item = pool[currentIndex];
        document.getElementById('meaningDisplay').innerText = item.meaning;
        
        const group = document.getElementById('optionsGroup');
        group.innerHTML = '';
        let choices = [item.word, ...rawData.filter(d=>d.word!==item.word).map(d=>d.word).slice(0,3)].sort(()=>Math.random()-0.5);

        choices.forEach(txt => {
            const btn = document.createElement('button');
            btn.className = 'quiz-option';
            btn.innerText = txt;
            btn.onclick = function() {
                // 只要還沒點「下一題」，都可以換
                document.querySelectorAll('.quiz-option').forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
                selectedWord = txt;
            };
            group.appendChild(btn);
        });
    }

    function handleNext() {
        if (!selectedWord) return alert("請先選一個答案喔！");
        
        const item = pool[currentIndex];
        const isCorrect = (selectedWord === item.word);
        
        // 紀錄結果
        batchLog.push({ meaning: item.meaning, selected: selectedWord, correct: item.word, isCorrect, row: item.row, delta: isCorrect ? 1 : -1 });
        
        // 顯示對錯回饋 (短暫停頓讓柏伸看清楚)
        document.querySelectorAll('.quiz-option').forEach(b => {
            if (b.innerText === item.word) b.classList.add('correct');
            else if (b.innerText === selectedWord && !isCorrect) b.classList.add('wrong');
        });

        setTimeout(nextQuestion, 800); // 0.8秒後自動下一題，不用多按一次
    }

    async function showReportAndSync() {
        document.getElementById('gameArea').style.display = 'none';
        document.getElementById('reportArea').style.display = 'block';
        const list = document.getElementById('reportList');
        list.innerHTML = batchLog.sort((a,b)=>a.isCorrect-b.isCorrect).map(i => `
            <div class="report-item">
                <small>${i.meaning}</small><br>
                <b>${i.isCorrect ? '✅ '+i.correct : '❌ '+i.selected+' → '+i.correct}</b>
            </div>
        `).join('');

        isSyncing = true;
        try {
            await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(batchLog.map(l=>({row:l.row, delta:l.delta}))) });
            document.getElementById('syncStatusBanner').innerText = "✅ 同步成功！";
            document.getElementById('syncStatusBanner').style.background = "#27ae60";
        } catch (e) { 
            document.getElementById('syncStatusBanner').innerText = "❌ 同步失敗"; 
        }
        isSyncing = false;
    }

    window.onload = init;
</script>
</body>
</html>
