<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>柏伸智慧複習 v3.1.2</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; text-align: center; padding: 20px; background-color: #f0f4f8; color: #2c3e50; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: inline-block; width: 95%; max-width: 500px; text-align: left; box-sizing: border-box; }
        
        /* 標籤樣式 */
        .tag-container { margin: 15px 0; display: flex; flex-wrap: wrap; gap: 8px; }
        .tag-pill { padding: 6px 14px; border-radius: 20px; background: #ecf0f1; font-size: 13px; cursor: pointer; transition: 0.2s; border: 1px solid #ddd; }
        .tag-pill.active { background: #3498db; color: white; border-color: #2980b9; }

        .setting-item { margin: 15px 0; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; margin-top: 5px; }
        .primary-btn { width: 100%; padding: 18px; margin-top: 10px; font-size: 18px; cursor: pointer; border-radius: 12px; border: none; background: #3498db; color: white; font-weight: bold; }
        
        .quiz-option { width: 100%; padding: 16px; margin: 10px 0; border: 2px solid #ecf0f1; border-radius: 12px; background: white; font-size: 19px; cursor: pointer; text-align: left; }
        .quiz-option.selected { border-color: #3498db; background-color: #ebf5fb; }
        .correct { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }
        
        .meaning-box { background: #fff9db; padding: 20px; border-radius: 15px; font-size: 22px; line-height: 1.6; border-left: 10px solid #f1c40f; margin: 20px 0; }
        .sync-banner { background: #34495e; color: white; padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 10px; font-size: 14px; }
        #loader { padding: 50px; text-align: center; font-weight: bold; color: #f39c12; }
    </style>
</head>
<body>

<div class="card">
    <div id="loader">📡 正在連接資料庫...</div>

    <div id="setupArea" style="display:none;">
        <h2 style="margin:0 0 10px 0; text-align:center;">📚 選擇題庫</h2>
        <div class="setting-item">
            <label>選擇分冊 (* 開頭)：</label>
            <select id="sheetSelect"></select>
        </div>
        <button id="loadSheetBtn" class="primary-btn" onclick="loadSheetData()">載入此題庫 ➔</button>

        <div id="subSetup" style="display:none; margin-top:20px; border-top:2px dashed #eee; padding-top:20px;">
            <label>💡 依標籤篩選 (選填)：</label>
            <div id="tagCloud" class="tag-container"></div>
            
            <div class="setting-item">
                <label>測驗題數：</label>
                <select id="quizCount"><option value="10">10 題</option><option value="20">20 題</option><option value="30">30 題</option></select>
            </div>
            
            <button class="primary-btn" style="background:#e74c3c;" onclick="startQuiz('hard')">🔥 地獄挑戰 (不熟優先)</button>
            <button class="primary-btn" onclick="startQuiz('mix')">⚖️ 智慧練習 (混合)</button>
        </div>
    </div>

    <div id="gameArea" style="display:none;">
        <div id="gameHeader" style="font-size:12px; color:#95a5a6; margin-bottom:5px;"></div>
        <div id="meaningDisplay" class="meaning-box"></div>
        <div id="optionsGroup"></div>
        <button id="confirmBtn" class="primary-btn" style="background:#2c3e50;" onclick="handleNext()">確認答案 ➔</button>
    </div>

    <div id="reportArea" style="display:none;">
        <div id="syncStatusBanner" class="sync-banner">🔄 進度同步中...</div>
        <div id="reportList" style="max-height:300px; overflow-y:auto; margin-bottom:15px; border:1px solid #eee; border-radius:10px; padding:10px;"></div>
        <button class="primary-btn" onclick="location.reload()">回首頁選其他題庫</button>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwdIKdIUNvTrWUK30PfzmsKl4Rtd_t1pID7dk8DcYLON_sCxRoH1f5s3h0L3coYHa3A/exec"; 
    let allData = [], pool = [], currentIndex = -1, batchLog = [], isSyncing = false;
    let selectedWord = null, currentSheetName = "", activeTag = null;

    window.onbeforeunload = () => isSyncing ? "同步中，請勿離開" : null;

    // 初始化：抓取 * 分頁
    async function init() {
        try {
            const res = await fetch(`${GAS_URL}?action=getSheets&cb=${Date.now()}`);
            const json = await res.json();
            const select = document.getElementById('sheetSelect');
            json.sheets.forEach(name => {
                let opt = document.createElement('option');
                opt.value = name; opt.innerText = name;
                select.appendChild(opt);
            });
            document.getElementById('loader').style.display = 'none';
            document.getElementById('setupArea').style.display = 'block';
        } catch (e) {
            document.getElementById('loader').innerText = "❌ 連線失敗，請檢查 GAS 網址。";
        }
    }

    // 載入選定分頁
    async function loadSheetData() {
        const sheetName = document.getElementById('sheetSelect').value;
        const btn = document.getElementById('loadSheetBtn');
        btn.innerText = "⏳ 載入中...";
        btn.disabled = true;

        try {
            const res = await fetch(`${GAS_URL}?action=read&sheetName=${encodeURIComponent(sheetName)}&cb=${Date.now()}`);
            const json = await res.json();
            allData = json.data;
            currentSheetName = json.currentSheet;
            
            // 自動偵測 Tags
            const tags = new Set();
            allData.forEach(item => item.tags.forEach(t => tags.add(t)));
            
            const cloud = document.getElementById('tagCloud');
            cloud.innerHTML = '';
            if(tags.size === 0) cloud.innerHTML = '<span style="color:#ccc; font-size:12px;">此題庫無標籤</span>';
            
            tags.forEach(tag => {
                const span = document.createElement('span');
                span.className = 'tag-pill';
                span.innerText = tag;
                span.onclick = function() {
                    document.querySelectorAll('.tag-pill').forEach(p => p.classList.remove('active'));
                    if (activeTag === tag) {
                        activeTag = null;
                    } else {
                        activeTag = tag;
                        this.classList.add('active');
                    }
                };
                cloud.appendChild(span);
            });

            btn.style.display = 'none';
            document.getElementById('subSetup').style.display = 'block';
        } catch (e) {
            alert("載入失敗");
            btn.disabled = false;
            btn.innerText = "載入此題庫 ➔";
        }
    }

    function startQuiz(mode) {
        const totalTarget = parseInt(document.getElementById('quizCount').value);
        
        // 1. 先標籤篩選
        let filtered = activeTag ? allData.filter(d => d.tags.includes(activeTag)) : allData;
        if(filtered.length === 0) { alert("該標籤下沒有題目！"); return; }

        // 2. 智慧抽題邏輯
        let red = filtered.filter(d => d.score <= 3).sort(() => Math.random() - 0.5);
        let others = filtered.filter(d => d.score > 3).sort(() => Math.random() - 0.5);
        
        pool = [];
        if (mode === 'hard') {
            pool = [...red, ...others].slice(0, totalTarget);
        } else {
            pool = filtered.sort(() => Math.random() - 0.5).slice(0, totalTarget);
        }

        document.getElementById('setupArea').style.display = 'none';
        document.getElementById('gameArea').style.display = 'block';
        nextQuestion();
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex >= pool.length) { showReportAndSync(); return; }
        
        selectedWord = null;
        const item = pool[currentIndex];
        document.getElementById('gameHeader').innerText = `${currentSheetName} | 題號：${currentIndex + 1}/${pool.length} (熟練度:${item.score})`;
        document.getElementById('meaningDisplay').innerText = item.meaning;
        
        const group = document.getElementById('optionsGroup');
        group.innerHTML = '';
        let choices = [item.word, ...allData.filter(d=>d.word!==item.word).map(d=>d.word).sort(()=>Math.random()-0.5).slice(0,3)].sort(()=>Math.random()-0.5);

        choices.forEach(txt => {
            const btn = document.createElement('button');
            btn.className = 'quiz-option';
            btn.innerText = txt;
            btn.onclick = function() {
                document.querySelectorAll('.quiz-option').forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
                selectedWord = txt;
            };
            group.appendChild(btn);
        });
    }

    function handleNext() {
        if (!selectedWord) return alert("選一個答案吧！");
        const item = pool[currentIndex];
        const isCorrect = (selectedWord === item.word);
        
        batchLog.push({ row: item.row, delta: isCorrect ? 1 : -1, meaning: item.meaning, selected: selectedWord, correct: item.word, isCorrect });
        
        document.querySelectorAll('.quiz-option').forEach(b => {
            if (b.innerText === item.word) b.classList.add('correct');
            else if (b.innerText === selectedWord && !isCorrect) b.classList.add('wrong');
        });

        setTimeout(nextQuestion, 800);
    }

    async function showReportAndSync() {
        document.getElementById('gameArea').style.display = 'none';
        document.getElementById('reportArea').style.display = 'block';
        const list = document.getElementById('reportList');
        list.innerHTML = batchLog.sort((a,b)=>a.isCorrect-b.isCorrect).map(i => `
            <div style="padding:10px; border-bottom:1px solid #eee;">
                <small style="color:#999">${i.meaning}</small><br>
                <b>${i.isCorrect ? '✅ '+i.correct : '❌ '+i.selected+' → '+i.correct}</b>
            </div>`).join('');

        isSyncing = true;
        try {
            await fetch(`${GAS_URL}?sheetName=${encodeURIComponent(currentSheetName)}`, {
                method: 'POST', mode: 'no-cors', body: JSON.stringify(batchLog.map(l=>({row:l.row, delta:l.delta})))
            });
            document.getElementById('syncStatusBanner').innerText = "✅ 進度已同步至 Excel";
            document.getElementById('syncStatusBanner').style.background = "#27ae60";
        } catch (e) { document.getElementById('syncStatusBanner').innerText = "❌ 同步連線異常"; }
        isSyncing = false;
    }

    window.onload = init;
</script>
</body>
</html>
