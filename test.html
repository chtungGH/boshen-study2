<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>柏伸聽寫 BETA - 多選課次版</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; text-align: center; padding: 20px; background-color: #f7f9fc; color: #2c3e50; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); display: inline-block; width: 95%; max-width: 400px; min-height: 250px; text-align: left; }
        
        /* 複選框區塊樣式 */
        .lesson-group { margin: 15px 0; border: 1px solid #eee; padding: 15px; border-radius: 10px; background: #fafafa; }
        .lesson-item { display: flex; align-items: center; margin: 10px 0; font-size: 18px; cursor: pointer; }
        .lesson-item input { margin-right: 15px; transform: scale(1.5); }

        .top-bar { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 14px; color: #7f8c8d; }
        .stop-link { color: #e74c3c; cursor: pointer; text-decoration: underline; }
        .bopomofo { font-size: 72px; font-weight: bold; margin: 30px 0; min-height: 90px; color: #34495e; text-align: center; }
        .answer { font-size: 48px; color: #27ae60; margin: 15px 0; display: none; font-weight: bold; text-align: center; }
        
        button { font-size: 20px; padding: 15px; margin: 8px 0; cursor: pointer; border-radius: 12px; border: none; background: #3498db; color: white; width: 100%; box-shadow: 0 4px 0 #2980b9; }
        .next-btn { background: #e67e22; box-shadow: 0 4px 0 #d35400; margin-top: 20px; font-weight: bold; }
        .ans-btn { background: #95a5a6; box-shadow: 0 4px 0 #7f8c8d; font-size: 16px; width: 60%; display: block; margin: 10px auto; }
        
        .master-area { margin-top: 25px; font-size: 20px; display: flex; justify-content: center; align-items: center; gap: 12px; padding: 10px; }
        #loader { font-weight: bold; color: #e67e22; margin-top: 50px; text-align: center; }
    </style>
</head>
<body>

    <div class="card">
        <div id="loader">🚀 多選功能載入中...</div>
        
        <div id="setupArea" style="display:none;">
            <h2 style="margin-top:0; text-align: center;">📚 選擇練習課次</h2>
            <p style="font-size: 14px; color: #666; text-align: center;">(可勾選多課混合出題)</p>
            
            <div id="lessonContainer" class="lesson-group">
                </div>
            
            <button onclick="startQuiz()">開始混合練習</button>
        </div>

        <div id="quizArea" style="display:none;">
            <div class="top-bar">
                <div id="status">進度：-- / --</div>
                <div class="stop-link" onclick="location.reload()">🛑 返回選單</div>
            </div>
            <div class="bopomofo" id="bpmfDisplay">---</div>
            <div class="answer" id="wordDisplay">---</div>
            <button onclick="speak()">🔊 聽讀意</button>
            <button class="ans-btn" onclick="document.getElementById('wordDisplay').style.display='block'">看答案</button>
            <div class="master-area">
                <input type="checkbox" id="masterCheck">
                <label for="masterCheck">標記熟練</label>
            </div>
            <button class="next-btn" onclick="handleNext()">下一題 ➔</button>
        </div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR8h56wLvxnA4_Xr7oLo_iO8WycSoz5Mw7m9fJrIw2R6JwhGP5bvAmnPG9yOoYg9WSrnliwmA8wbXhR/pub?output=csv";
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwLd_hDSaEN4FqumCz5_xCFIzkYc4pQsWxd6UnQFw9aFIMo_PuDMfi2CPfKaXI1rWbpoA/exec";

        let allData = [];
        let currentPool = [];
        let index = -1;
        let preferredVoice = null;

        function loadVoices() {
            const voices = window.speechSynthesis.getVoices();
            preferredVoice = voices.find(v => v.name.includes("Google") && v.lang.includes("zh-TW")) ||
                             voices.find(v => v.name.includes("Hanhan")) ||
                             voices.find(v => v.lang.includes("zh-TW"));
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;

        async function init() {
            try {
                const response = await fetch(CSV_URL + "&cb=" + Date.now());
                const dataText = await response.text();
                const rows = dataText.split(/\r?\n/).filter(r => r.trim() !== "");
                
                allData = rows.slice(1).map((line, i) => {
                    const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return {
                        row: i + 2,
                        lesson: (cols[0] || "").replace(/"/g,'').trim(),
                        word: (cols[1] || "").replace(/"/g,'').trim(),
                        bpmf: (cols[2] || "").replace(/"/g,'').trim(),
                        mastered: (cols[3] || "").replace(/"/g,'').trim() === '是'
                    };
                }).filter(item => item.word);

                // 生成 Checkbox 清單
                const lessons = [...new Set(allData.map(d => d.lesson))].sort();
                const container = document.getElementById('lessonContainer');
                lessons.forEach(l => {
                    const label = document.createElement('label');
                    label.className = 'lesson-item';
                    label.innerHTML = `<input type="checkbox" name="lesson" value="${l}"> ${l}`;
                    container.appendChild(label);
                });

                document.getElementById('loader').style.display = 'none';
                document.getElementById('setupArea').style.display = 'block';
                loadVoices();
            } catch (err) {
                document.getElementById('loader').innerText = "連線失敗";
            }
        }

        function startQuiz() {
            // 獲取所有被勾選的課次
            const checkboxes = document.querySelectorAll('input[name="lesson"]:checked');
            const selectedLessons = Array.from(checkboxes).map(cb => cb.value);

            if (selectedLessons.length === 0) return alert("請至少勾選一課！");

            // 過濾出「被選中」且「未熟練」的題目
            currentPool = allData.filter(d => 
                selectedLessons.includes(d.lesson) && !d.mastered
            );
            
            currentPool.sort(() => Math.random() - 0.5);
            if (currentPool.length === 0) return alert("選中的課次都練熟囉！");

            window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
            document.getElementById('setupArea').style.display = 'none';
            document.getElementById('quizArea').style.display = 'block';
            index = -1;
            showNext();
        }

        function speak() {
            if (index < 0) return;
            window.speechSynthesis.cancel();
            setTimeout(() => {
                const utterance = new SpeechSynthesisUtterance(currentPool[index].bpmf);
                if (preferredVoice) utterance.voice = preferredVoice;
                utterance.lang = 'zh-TW';
                utterance.rate = 0.8;
                window.speechSynthesis.speak(utterance);
            }, 50);
        }

        function showNext() {
            index++;
            if (index < currentPool.length) {
                document.getElementById('bpmfDisplay').innerText = currentPool[index].bpmf;
                document.getElementById('wordDisplay').innerText = currentPool[index].word;
                document.getElementById('wordDisplay').style.display = 'none';
                document.getElementById('status').innerText = `進度：${index + 1} / ${currentPool.length}`;
                document.getElementById('masterCheck').checked = false;
                speak();
            } else { alert("練習完成！"); location.reload(); }
        }

        function handleNext() {
            if (document.getElementById('masterCheck').checked) {
                fetch(GAS_URL + "?action=mastered&row=" + currentPool[index].row, { mode: 'no-cors' });
            }
            showNext();
        }
        window.onload = init;
    </script>
</body>
</html>
