<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>柏伸詞語智慧複習 v2.2.0</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; text-align: center; padding: 20px; background-color: #f0f4f8; color: #2c3e50; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: inline-block; width: 95%; max-width: 500px; text-align: left; box-sizing: border-box; }
        
        /* 設定區樣式 */
        .setting-item { margin: 15px 0; }
        select, input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; margin-top: 5px; }
        
        /* 答題區樣式 */
        .meaning-box { background: #fff9db; padding: 20px; border-radius: 15px; font-size: 22px; line-height: 1.6; border-left: 10px solid #f1c40f; margin: 20px 0; }
        .quiz-option { width: 100%; padding: 16px; margin: 10px 0; border: 2px solid #ecf0f1; border-radius: 12px; background: white; font-size: 19px; cursor: pointer; text-align: left; }
        .correct { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }
        
        /* 戰報區樣式 */
        .report-item { padding: 10px; border-bottom: 1px solid #eee; font-size: 15px; }
        .report-q { color: #7f8c8d; font-style: italic; display: block; margin-bottom: 5px; }
        .report-res { font-weight: bold; }
        .sync-banner { background: #34495e; color: white; padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 15px; font-size: 14px; }
        
        button.primary-btn { width: 100%; padding: 18px; margin-top: 10px; font-size: 18px; cursor: pointer; border-radius: 12px; border: none; background: #3498db; color: white; font-weight: bold; }
        #loader { text-align: center; padding: 50px; font-weight: bold; color: #f39c12; }
    </style>
</head>
<body>

<div class="card">
    <div id="loader">⚡ 正在連結智慧資料庫...</div>

    <div id="setupArea" style="display:none;">
        <h2 style="text-align:center;">🧠 詞語智慧測驗</h2>
        
        <div class="setting-item">
            <label>選擇練習題數：</label>
            <select id="quizCount">
                <option value="10">10 題</option>
                <option value="20">20 題</option>
                <option value="30">30 題</option>
                <option value="50">50 題</option>
            </select>
        </div>

        <div class="setting-item">
            <label>選擇難度模式：</label>
            <button class="primary-btn" style="background:#e74c3c;" onclick="prepareApp('hard')">🔥 地獄挑戰 (9:1:0)</button>
            <button class="primary-btn" style="background:#3498db;" onclick="prepareApp('mix')">⚖️ 智慧練習 (7:2:1)</button>
            <button class="primary-btn" style="background:#27ae60;" onclick="prepareApp('review')">🔄 溫故知新 (4:4:2)</button>
        </div>
    </div>

    <div id="gameArea" style="display:none;">
        <div style="display:flex; justify-content: space-between; font-size:13px; color:#bdc3c7;">
            <span id="progressText"></span>
            <span id="scoreText"></span>
        </div>
        <div class="meaning-box" id="meaningDisplay"></div>
        <div id="optionsGroup"></div>
        <button id="nextBtn" class="primary-btn" style="display:none; background:#2c3e50;" onclick="nextQuestion()">下一題 ➔</button>
    </div>

    <div id="reportArea" style="display:none;">
        <div id="syncStatusBanner" class="sync-banner">🔄 正在同步進度到雲端...</div>
        <h2 style="text-align:center; margin-bottom:10px;">📊 練習戰報</h2>
        <div id="reportList" style="max-height: 400px; overflow-y: auto; border: 1px solid #eee; padding: 10px; border-radius: 10px;"></div>
        <button class="primary-btn" onclick="location.reload()">完成並返回</button>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwdIKdIUNvTrWUK30PfzmsKl4Rtd_t1pID7dk8DcYLON_sCxRoH1f5s3h0L3coYHa3A/exec"; 
    let rawData = [];
    let pool = [];
    let currentIndex = -1;
    let batchLog = []; // 存 [{word, meaning, selected, correct, isCorrect, row, delta}]
    let isSyncing = false;

    // 離開提醒邏輯
    window.onbeforeunload = function() {
        if (isSyncing) return "資料正在同步中，確定要離開嗎？";
    };

    async function init() {
        try {
            const res = await fetch(`${GAS_URL}?action=read&cb=${Date.now()}`);
            const json = await res.json();
            rawData = json.data;
            document.getElementById('loader').style.display = 'none';
            document.getElementById('setupArea').style.display = 'block';
        } catch (e) {
            document.getElementById('loader').innerHTML = "❌ 連線失敗";
        }
    }

    function prepareApp(mode) {
        const totalTarget = parseInt(document.getElementById('quizCount').value);
        
        // 1. 分類並洗牌
        let red = rawData.filter(d => d.score <= 3).sort(() => Math.random() - 0.5);
        let yellow = rawData.filter(d => d.score >= 4 && d.score <= 7).sort(() => Math.random() - 0.5);
        let green = rawData.filter(d => d.score >= 8).sort(() => Math.random() - 0.5);

        // 2. 計算配額
        let counts = { red: 0, yellow: 0, green: 0 };
        if (mode === 'hard') { counts.red = Math.floor(totalTarget * 0.9); counts.yellow = totalTarget - counts.red; }
        else if (mode === 'mix') { counts.red = Math.floor(totalTarget * 0.7); counts.yellow = Math.floor(totalTarget * 0.2); counts.green = totalTarget - counts.red - counts.yellow; }
        else { counts.red = Math.floor(totalTarget * 0.4); counts.yellow = Math.floor(totalTarget * 0.4); counts.green = totalTarget - counts.red - counts.yellow; }

        // 3. 不重複抽取
        pool = [];
        for(let i=0; i<counts.red; i++) { if(red.length > 0) pool.push(red.shift()); }
        for(let i=0; i<counts.yellow; i++) { if(yellow.length > 0) pool.push(yellow.shift()); }
        for(let i=0; i<counts.green; i++) { if(green.length > 0) pool.push(green.shift()); }

        // 4. 補位
        if (pool.length < totalTarget) {
            let remain = [...red, ...yellow, ...green].sort(() => Math.random() - 0.5);
            while (pool.length < totalTarget && remain.length > 0) pool.push(remain.shift());
        }

        pool.sort(() => Math.random() - 0.5);
        startQuiz();
    }

    function startQuiz() {
        document.getElementById('setupArea').style.display = 'none';
        document.getElementById('gameArea').style.display = 'block';
        nextQuestion();
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex >= pool.length) {
            finishAndSync();
            return;
        }
        const item = pool[currentIndex];
        document.getElementById('progressText').innerText = `題號：${currentIndex + 1} / ${pool.length}`;
        document.getElementById('scoreText').innerText = `熟練度: ${item.score}`;
        document.getElementById('meaningDisplay').innerText = item.meaning;
        document.getElementById('nextBtn').style.display = 'none';
        renderOptions(item);
    }

    function renderOptions(item) {
        const group = document.getElementById('optionsGroup');
        group.innerHTML = '';
        let others = rawData.filter(d => d.word !== item.word).map(d => d.word).sort(() => Math.random() - 0.5);
        let choices = [item.word, ...others.slice(0, 3)].sort(() => Math.random() - 0.5);

        choices.forEach(txt => {
            const btn = document.createElement('button');
            btn.className = 'quiz-option';
            btn.innerText = txt;
            btn.onclick = function() {
                const isCorrect = (txt === item.word);
                batchLog.push({
                    meaning: item.meaning,
                    selected: txt,
                    correct: item.word,
                    isCorrect: isCorrect,
                    row: item.row,
                    delta: isCorrect ? 1 : -1
                });
                
                document.querySelectorAll('.quiz-option').forEach(b => {
                    b.disabled = true;
                    if(b.innerText === item.word) b.classList.add('correct');
                    else if(b.innerText === txt && !isCorrect) b.classList.add('wrong');
                });
                document.getElementById('nextBtn').style.display = 'block';
            };
            group.appendChild(btn);
        });
    }

    async function finishAndSync() {
        document.getElementById('gameArea').style.display = 'none';
        document.getElementById('reportArea').style.display = 'block';
        
        // 渲染戰報 (錯題置頂)
        const list = document.getElementById('reportList');
        const sortedLog = [...batchLog].sort((a,b) => a.isCorrect - b.isCorrect);
        list.innerHTML = sortedLog.map(item => `
            <div class="report-item">
                <span class="report-q">${item.meaning}</span>
                <span class="report-res" style="color:${item.isCorrect ? '#2ecc71' : '#e74c3c'}">
                    ${item.isCorrect ? '✅ ' + item.correct : '❌ ' + item.selected + ' (正確：' + item.correct + ')'}
                </span>
            </div>
        `).join('');

        // 自動同步
        isSyncing = true;
        try {
            const syncData = batchLog.map(l => ({ row: l.row, delta: l.delta }));
            await fetch(`${GAS_URL}?action=batchUpdate&data=${encodeURIComponent(JSON.stringify(syncData))}`);
            document.getElementById('syncStatusBanner').innerText = "✅ 同步完成！所有進度已儲存。";
            document.getElementById('syncStatusBanner').style.background = "#27ae60";
        }// 【更新：使用 POST 同步】
        isSyncing = true;
        try {
            const syncData = batchLog.map(l => ({ row: l.row, delta: l.delta }));
            
            await fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors', // 避開 CORS 限制
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(syncData)
            });

            // 因為 no-cors 看不到回傳結果，我們直接假設發送成功 (通常只要沒噴錯就是成功)
            document.getElementById('syncStatusBanner').innerText = "✅ 同步指令已發出！(Excel 更新中)";
            document.getElementById('syncStatusBanner').style.background = "#27ae60";
        } catch (e) {
            document.getElementById('syncStatusBanner').innerText = "❌ 同步失敗，請檢查網路。";
            document.getElementById('syncStatusBanner').style.background = "#e74c3c";
        }
        isSyncing = false;
    }

    window.onload = init;
</script>
</body>
</html>
