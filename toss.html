<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bryson家台幣 50 元擲硬幣</title>
    <style>
        :root {
            --coin-size: 200px; 
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            color: #333;
        }

        .coin-container {
            perspective: 1500px;
            margin-bottom: 40px;
        }

        .coin {
            width: var(--coin-size);
            height: var(--coin-size);
            position: relative;
            transform-style: preserve-3d;
            /* 使用 ease-out 讓結尾更有停下來的感覺 */
            transition: transform 2s cubic-bezier(0.1, 0, 0.1, 1); 
            cursor: pointer;
        }

        .side {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            backface-visibility: hidden;
            background-size: cover;
            background-position: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2), 0 10px 20px rgba(0,0,0,0.2);
        }

        /* 正面 - 50-new_1.jpg */
        .heads {
            background-image: url('image_0.png'); 
        }

        /* 反面 - 50-new_2.jpg */
        .tails {
            background-image: url('image_1.pngg');
            transform: rotateY(180deg);
        }

        button {
            padding: 12px 35px;
            font-size: 1.3rem;
            cursor: pointer;
            background-color: #f1c40f;
            color: #2c3e50;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: 0.2s;
        }

        button:hover { background-color: #f39c12; transform: scale(1.05); }
        button:active { transform: scale(0.95); }

        #resultText {
            margin-top: 25px;
            font-size: 1.8rem;
            font-weight: bold;
            height: 2.5rem;
            color: #e67e22;
        }
    </style>
</head>
<body>

    <h1>決定命運的 moment！</h1>

    <div class="coin-container" onclick="flipCoin()">
        <div class="coin" id="coin">
            <div class="side heads"></div>
            <div class="side tails"></div>
        </div>
    </div>

    <button onclick="flipCoin()">開始擲幣</button>
    <div id="resultText">點擊硬幣或按鈕開始</div>

    <script>
        let currentRotation = 0;
        let isFlipping = false;

        function flipCoin() {
            if (isFlipping) return;
            
            isFlipping = true;
            const coin = document.getElementById('coin');
            const resultDisplay = document.getElementById('resultText');
            
            // 1. 隨機決定結果
            const isHeads = Math.random() < 0.5;
            
            // 2. 角度計算強化
            // 每次至少轉 10 圈 (3600度)，確保視覺上很快
            // 使用取餘數的概念，確保最後停下的位置精確對準 0度(正) 或 180度(反)
            const spins = 3600; 
            const degrees = isHeads ? 0 : 180;
            
            // 關鍵：將目前的旋轉加到下一個整圈的角度上
            currentRotation += spins + degrees + (360 - (currentRotation % 360));
            
            // 3. 執行動畫
            coin.style.transform = `rotateY(${currentRotation}deg)`;
            
            resultDisplay.innerText = "命運旋轉中...";
            resultDisplay.style.color = "#888";

            // 4. 動畫結束後的處理 (動畫時間設為 2秒)
            setTimeout(() => {
                isFlipping = false;
                if (isHeads) {
                    resultDisplay.innerText = "✨ 結果是：正面 (國父像)！";
                    resultDisplay.style.color = "#e67e22";
                } else {
                    resultDisplay.innerText = "✨ 結果是：反面 (50圓)！";
                    resultDisplay.style.color = "#c0392b";
                }
            }, 2000); 
        }
    </script>
</body>
</html>
