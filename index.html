<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>柏伸聽寫 - 診斷版</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f7f9fc; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); display: inline-block; width: 95%; max-width: 400px; }
        #loader { color: #e67e22; font-weight: bold; }
        .error-msg { color: #e74c3c; background: #fdeaea; padding: 10px; border-radius: 10px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <div id="loader">🚀 嘗試連線至 Google 試算表...</div>
        <div id="errorArea" class="error-msg"></div>
        
        <div id="setupArea" style="display:none;">
            <h2>✍️ 選擇課次</h2>
            <select id="lessonSelect" style="font-size:18px; padding:10px; width:80%;"></select><br><br>
            <button id="startBtn" style="font-size:20px; padding:15px; width:80%; background:#3498db; color:white; border:none; border-radius:10px;">開始練習</button>
        </div>

        <div id="quizArea" style="display:none;">
            <p id="status" style="color:gray"></p>
            <h1 id="bpmfDisplay" style="font-size:60px">---</h1>
            <h2 id="wordDisplay" style="font-size:40px; color:#27ae60; display:none">---</h2>
            <button onclick="speak()" style="width:80%; padding:10px; margin:5px">🔊 聽音</button><br>
            <button onclick="document.getElementById('wordDisplay').style.display='block'" style="width:80%; padding:10px; margin:5px">看答案</button><br>
            <div style="margin:15px">
                <input type="checkbox" id="masterCheck" style="transform:scale(1.5)"> <label>這題練熟了</label>
            </div>
            <button onclick="handleNext()" style="width:80%; padding:15px; background:#e67e22; color:white; border:none; border-radius:10px;">下一題</button>
        </div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR8h56wLvxnA4_Xr7oLo_iO8WycSoz5Mw7m9fJrIw2R6JwhGP5bvAmnPG9yOoYg9WSrnliwmA8wbXhR/pub?output=csv";
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwLd_hDSaEN4FqumCz5_xCFIzkYc4pQsWxd6UnQFw9aFIMo_PuDMfi2CPfKaXI1rWbpoA/exec";

        let allData = [];
        let currentPool = [];
        let index = -1;

        async function init() {
            try {
                console.log("開始抓取 CSV...");
                const res = await fetch(CSV_URL);
                const txt = await res.text();
                console.log("CSV 抓取成功，長度：", txt.length);

                const rows = txt.split(/\r?\n/).filter(r => r.trim() !== "");
                allData = rows.slice(1).map((r, i) => {
                    // 使用更強大的 CSV 切割邏輯，避免逗號問題
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return {
                        row: i + 2,
                        lesson: (c[0] || "").replace(/"/g,'').trim(),
                        word: (c[1] || "").replace(/"/g,'').trim(),
                        bpmf: (c[2] || "").replace(/"/g,'').trim(),
                        mastered: (c[3] || "").replace(/"/g,'').trim() === '是'
                    };
                }).filter(d => d.word && d.lesson);

                if (allData.length === 0) throw new Error("試算表內好像沒有資料？");

                const lessons = [...new Set(allData.map(d => d.lesson))];
                const select = document.getElementById('lessonSelect');
                lessons.forEach(l => {
                    const opt = document.createElement('option');
                    opt.value = l; opt.textContent = l;
                    select.appendChild(opt);
                });

                document.getElementById('loader').style.display = 'none';
                document.getElementById('setupArea').style.display = 'block';
                document.getElementById('startBtn').onclick = startQuiz;

            } catch (err) {
                console.error(err);
                document.getElementById('loader').style.display = 'none';
                document.getElementById('errorArea').style.display = 'block';
                document.getElementById('errorArea').innerText = "連線出錯: " + err.message;
            }
        }

        function startQuiz() {
            const lesson = document.getElementById('lessonSelect').value;
            currentPool = allData.filter(d => d.lesson === lesson && !d.mastered);
            currentPool.sort(() => Math.random() - 0.5);
            if (currentPool.length === 0) return alert("這一課都練熟囉！");
            document.getElementById('setupArea').style.display = 'none';
            document.getElementById('quizArea').style.display = 'block';
            showNext();
        }

        function showNext() {
            index++;
            if (index < currentPool.length) {
                document.getElementById('bpmfDisplay').innerText = currentPool[index].bpmf;
                document.getElementById('wordDisplay').innerText = currentPool[index].word;
                document.getElementById('wordDisplay').style.display = 'none';
                document.getElementById('status').innerText = "剩餘 " + (currentPool.length - index - 1) + " 題";
                document.getElementById('masterCheck').checked = false;
                speak();
            } else {
                alert("練習結束！");
                location.reload();
            }
        }

        function handleNext() {
            if (document.getElementById('masterCheck').checked) {
                fetch(`${GAS_URL}?action=mastered&row=${currentPool[index].row}`, { mode: 'no-cors' });
            }
            showNext();
        }

        function speak() {
            const msg = new SpeechSynthesisUtterance(currentPool[index].bpmf);
            msg.lang = 'zh-TW'; msg.rate = 0.7;
            speechSynthesis.cancel();
            speechSynthesis.speak(msg);
        }

        window.onload = init;
    </script>
</body>
</html>
