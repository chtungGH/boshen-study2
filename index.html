<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>柏伸聽寫小助手</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; text-align: center; padding: 20px; background-color: #f7f9fc; color: #2c3e50; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); display: inline-block; width: 95%; max-width: 400px; }
        .top-bar { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 14px; color: #7f8c8d; }
        .stop-link { color: #e74c3c; cursor: pointer; text-decoration: underline; }
        select { font-size: 18px; padding: 8px; border-radius: 8px; width: 80%; margin: 20px 0; }
        .bopomofo { font-size: 68px; font-weight: bold; margin: 20px 0; min-height: 85px; color: #34495e; }
        .answer { font-size: 42px; color: #27ae60; margin: 10px 0; display: none; font-weight: bold; }
        button { font-size: 20px; padding: 15px; margin: 8px 0; cursor: pointer; border-radius: 12px; border: none; background: #3498db; color: white; width: 95%; box-shadow: 0 4px 0 #2980b9; }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #2980b9; }
        .next-btn { background: #e67e22; box-shadow: 0 4px 0 #d35400; margin-top: 15px; }
        .ans-btn { background: #95a5a6; box-shadow: 0 4px 0 #7f8c8d; font-size: 16px; width: 60%; }
        .master-area { margin-top: 20px; font-size: 18px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        input[type="checkbox"] { transform: scale(1.5); }
    </style>
</head>
<body>

    <div class="card">
        <div id="loader">🚀 同步雲端資料中...</div>
        
        <div id="setupArea" style="display:none;">
            <h2>✍️ 選擇課次</h2>
            <select id="lessonSelect"></select><br>
            <button id="startBtn">開始練習</button>
        </div>

        <div id="quizArea" style="display:none;">
            <div class="top-bar">
                <div id="status">計算中...</div>
                <div class="stop-link" onclick="location.reload()">🛑 終止</div>
            </div>
            <div class="bopomofo" id="bpmfDisplay">---</div>
            <div class="answer" id="wordDisplay">---</div>
            <button onclick="speak()">🔊 聽讀音</button>
            <button class="ans-btn" onclick="document.getElementById('wordDisplay').style.display='block'">看答案</button>
            <div class="master-area">
                <input type="checkbox" id="masterCheck">
                <label for="masterCheck">這題已熟練</label>
            </div>
            <button class="next-btn" onclick="handleNext()">下一題</button>
        </div>
    </div>

    <script>
        // 設定區
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR8h56wLvxnA4_Xr7oLo_iO8WycSoz5Mw7m9fJrIw2R6JwhGP5bvAmnPG9yOoYg9WSrnliwmA8wbXhR/pub?output=csv";
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwLd_hDSaEN4FqumCz5_xCFIzkYc4pQsWxd6UnQFw9aFIMo_PuDMfi2CPfKaXI1rWbpoA/exec";

        let allData = [];
        let currentPool = [];
        let index = -1;

        // 初始化：讀取資料
        async function init() {
            try {
                // 使用 timestamp 避免快取舊的 CSV
                const res = await fetch(CSV_URL + "&cb=" + Date.now());
                const txt = await res.text();
                const rows = txt.split(/\r?\n/).filter(r => r.trim() !== "");
                
                allData = rows.slice(1).map((r, i) => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return {
                        row: i + 2, 
                        lesson: (c[0] || "").replace(/"/g,'').trim(),
                        word: (c[1] || "").replace(/"/g,'').trim(),
                        bpmf: (c[2] || "").replace(/"/g,'').trim(),
                        mastered: (c[3] || "").replace(/"/g,'').trim() === '是'
                    };
                }).filter(d => d.word); // 僅保留有文字的列

                const lessons = [...new Set(allData.map(d => d.lesson))].filter(l => l);
                const select = document.getElementById('lessonSelect');
                lessons.forEach(l => {
                    let opt = document.createElement('option');
                    opt.value = l; opt.textContent = l;
                    select.appendChild(opt);
                });

                document.getElementById('loader').style.display = 'none';
                document.getElementById('setupArea').style.display = 'block';
                document.getElementById('startBtn').onclick = startQuiz;
            } catch (e) {
                document.getElementById('loader').innerText = "連線失敗，請檢查網路。";
            }
        }

        // 開始練習
        function startQuiz() {
            const lesson = document.getElementById('lessonSelect').value;
            currentPool = allData.filter(d => d.lesson === lesson && !d.mastered);
            currentPool.sort(() => Math.random() - 0.5);

            if (currentPool.length === 0) return alert("本課已全數練習完畢！");
            
            document.getElementById('setupArea').style.display = 'none';
            document.getElementById('quizArea').style.display = 'block';
            index = -1;
            showNext();
        }

        // 顯示下一題
        function showNext() {
            index++;
            if (index < currentPool.length) {
                document.getElementById('bpmfDisplay').innerText = currentPool[index].bpmf;
                document.getElementById('wordDisplay').innerText = currentPool[index].word;
                document.getElementById('wordDisplay').style.display = 'none';
                document.getElementById('status').innerText = `進度：${index + 1} / ${currentPool.length}`;
                document.getElementById('masterCheck').checked = false;
                speak();
            } else {
                alert("練習結束！");
                location.reload();
            }
        }

        // 處理下一題與背景紀錄
        function handleNext() {
            if (document.getElementById('masterCheck').checked) {
                // 背景發送寫入指令，不等待回應以提高順暢度
                fetch(`${GAS_URL}?action=mastered&row=${currentPool[index].row}`, { mode: 'no-cors' });
            }
            showNext();
        }

// 修改後的語音朗讀函式
function speak() {
    if (index < 0 || index >= currentPool.length) return;
    
    // 先取消所有排隊中的語音
    window.speechSynthesis.cancel();

    // 延遲 50 毫秒再發聲，給瀏覽器一點緩衝時間
    setTimeout(() => {
        const msg = new SpeechSynthesisUtterance(currentPool[index].bpmf);
        msg.lang = 'zh-TW'; 
        msg.rate = 0.8; // 稍微調快一點點比較像人聲
        msg.pitch = 1;  // 音調
        window.speechSynthesis.speak(msg);
    }, 50);
}

        window.onload = init;
    </script>
</body>
</html>
