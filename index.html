<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>柏伸聽寫小助手 v1.3.0</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; text-align: center; padding: 20px; background-color: #f7f9fc; color: #2c3e50; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); display: inline-block; width: 95%; max-width: 400px; min-height: 300px; }
        .top-bar { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 14px; color: #7f8c8d; }
        .stop-link { color: #e74c3c; cursor: pointer; text-decoration: underline; }
        select { font-size: 18px; padding: 10px; border-radius: 8px; width: 90%; margin: 20px 0; border: 1px solid #ddd; }
        .bopomofo { font-size: 72px; font-weight: bold; margin: 30px 0; min-height: 90px; color: #34495e; }
        .answer { font-size: 48px; color: #27ae60; margin: 15px 0; display: none; font-weight: bold; }
        button { font-size: 20px; padding: 15px; margin: 8px 0; cursor: pointer; border-radius: 12px; border: none; background: #3498db; color: white; width: 100%; box-shadow: 0 4px 0 #2980b9; transition: 0.1s; }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #2980b9; }
        .next-btn { background: #e67e22; box-shadow: 0 4px 0 #d35400; margin-top: 20px; font-weight: bold; }
        .ans-btn { background: #95a5a6; box-shadow: 0 4px 0 #7f8c8d; font-size: 16px; width: 60%; margin-top: 10px; }
        .master-area { margin-top: 25px; font-size: 20px; display: flex; justify-content: center; align-items: center; gap: 12px; padding: 10px; background: #fdfefe; border-radius: 10px; }
        input[type="checkbox"] { transform: scale(1.8); cursor: pointer; }
        #loader { font-weight: bold; color: #3498db; margin-top: 50px; }
    </style>
</head>
<body>

    <div class="card">
        <div id="loader">🚀 正在同步雲端題庫...</div>
        
        <div id="setupArea" style="display:none;">
            <h2 style="margin-top:0;">✍️ 選擇課次</h2>
            <select id="lessonSelect"></select><br>
            <button onclick="startQuiz()">開始練習</button>
        </div>

        <div id="quizArea" style="display:none;">
            <div class="top-bar">
                <div id="status">進度：-- / --</div>
                <div class="stop-link" onclick="location.reload()">🛑 終止練習</div>
            </div>

            <div class="bopomofo" id="bpmfDisplay">---</div>
            <div class="answer" id="wordDisplay">---</div>
            
            <button onclick="speak()">🔊 聽讀音</button>
            <button class="ans-btn" onclick="document.getElementById('wordDisplay').style.display='block'">看答案</button>
            
            <div class="master-area">
                <input type="checkbox" id="masterCheck">
                <label for="masterCheck">這題我練熟了</label>
            </div>

            <button class="next-btn" onclick="handleNext()">下一題 ➔</button>
        </div>
    </div>

    <script>
        // 配置資訊
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR8h56wLvxnA4_Xr7oLo_iO8WycSoz5Mw7m9fJrIw2R6JwhGP5bvAmnPG9yOoYg9WSrnliwmA8wbXhR/pub?output=csv";
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwLd_hDSaEN4FqumCz5_xCFIzkYc4pQsWxd6UnQFw9aFIMo_PuDMfi2CPfKaXI1rWbpoA/exec";

        let allData = [];
        let currentPool = [];
        let index = -1;

        // 初始化資料載入
        async function init() {
            try {
                // Cache-busting: 確保抓到最新的 Excel 狀態
                const response = await fetch(`${CSV_URL}&cb=${Date.now()}`);
                const dataText = await response.text();
                const rows = dataText.split(/\r?\n/).filter(r => r.trim() !== "");
                
                // 解析 CSV (跳過第一行標題)
                allData = rows.slice(1).map((line, i) => {
                    const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return {
                        row: i + 2, // Excel 實際行號
                        lesson: (cols[0] || "").replace(/"/g,'').trim(),
                        word: (cols[1] || "").replace(/"/g,'').trim(),
                        bpmf: (cols[2] || "").replace(/"/g,'').trim(),
                        mastered: (cols[3] || "").replace(/"/g,'').trim() === '是'
                    };
                }).filter(item => item.word !== ""); // 確保有字才載入

                // 產生課次選單
                const lessons = [...new Set(allData.map(d => d.lesson))].filter(l => l !== "");
                const select = document.getElementById('lessonSelect');
                lessons.forEach(l => {
                    const opt = document.createElement('option');
                    opt.value = opt.textContent = l;
                    select.appendChild(opt);
                });

                document.getElementById('loader').style.display = 'none';
                document.getElementById('setupArea').style.display = 'block';
                
                // 預熱語音引擎 (解決第一次沒聲音的問題)
                window.speechSynthesis.getVoices();
            } catch (err) {
                document.getElementById('loader').innerHTML = "❌ 連線失敗，請檢查網路後重新整理。";
                console.error(err);
            }
        }

        // 開始練習邏輯
        function startQuiz() {
            const selectedLesson = document.getElementById('lessonSelect').value;
