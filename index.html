<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>柏伸聽寫小助手 - 終極版</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; text-align: center; padding: 20px; background-color: #f7f9fc; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); display: inline-block; width: 95%; max-width: 450px; }
        .select-area { margin-bottom: 20px; }
        select { font-size: 18px; padding: 8px; border-radius: 8px; border: 1px solid #ddd; width: 80%; }
        .bopomofo { font-size: 64px; font-weight: bold; color: #2c3e50; margin: 25px 0; min-height: 80px; }
        .answer { font-size: 42px; color: #27ae60; margin: 15px 0; display: none; font-weight: bold; }
        button { font-size: 20px; padding: 14px; margin: 8px 0; cursor: pointer; border-radius: 12px; border: none; background: #3498db; color: white; width: 90%; transition: 0.2s; box-shadow: 0 4px 0 #2980b9; }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #2980b9; }
        .next-btn { background: #e67e22; box-shadow: 0 4px 0 #d35400; }
        .master-btn { background: #27ae60; box-shadow: 0 4px 0 #219150; font-size: 16px; margin-top: 20px; width: 60%; }
        #status { color: #7f8c8d; font-size: 14px; }
    </style>
</head>
<body>

    <h1>✍️ 柏伸聽寫練習</h1>
    
    <div class="card">
        <div id="loader">連線資料庫中...</div>
        
        <div id="setupArea" style="display:none;">
            <div class="select-area">
                <p>請選擇課次：</p>
                <select id="lessonSelect"></select>
            </div>
            <button onclick="startQuiz()">開始練習</button>
        </div>

        <div id="quizArea" style="display:none;">
            <div id="status">剩餘題數：-</div>
            <div class="bopomofo" id="bpmf">---</div>
            <div class="answer" id="word">---</div>
            
            <button onclick="speak()">🔊 聽讀音</button>
            <button class="next-btn" onclick="nextQuestion()">下一個</button>
            <button style="background:#95a5a6; box-shadow: 0 4px 0 #7f8c8d;" onclick="showAnswer()">看答案</button>
            <br>
            <button class="master-btn" id="masterBtn" onclick="markAsMastered()">✅ 我練熟了 (不再考)</button>
        </div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR8h56wLvxnA4_Xr7oLo_iO8WycSoz5Mw7m9fJrIw2R6JwhGP5bvAmnPG9yOoYg9WSrnliwmA8wbXhR/pub?output=csv";
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwLd_hDSaEN4FqumCz5_xCFIzkYc4pQsWxd6UnQFw9aFIMo_PuDMfi2CPfKaXI1rWbpoA/exec";

        let allData = [];
        let currentPool = [];
        let index = -1;

        async function init() {
            try {
                const res = await fetch(CSV_URL);
                const txt = await res.text();
                const rows = txt.split(/\r?\n/).filter(r => r.trim() !== "");
                
                // 解析資料 (加上 row 資訊以便寫入)
                allData = rows.map((r, i) => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return {
                        row: i + 1, // Excel 行號
                        lesson: c[0]?.replace(/"/g, '').trim(),
                        word: c[1]?.replace(/"/g, '').trim(),
                        bpmf: c[2]?.replace(/"/g, '').trim(),
                        mastered: c[3]?.replace(/"/g, '').trim() === '是'
                    };
                }).slice(1); // 跳過標題列

                // 取得不重複的課次選單
                const lessons = [...new Set(allData.map(d => d.lesson))];
                const select = document.getElementById('lessonSelect');
                lessons.forEach(l => {
                    let opt = document.createElement('option');
                    opt.value = l; opt.innerHTML = l;
                    select.appendChild(opt);
                });

                document.getElementById('loader').style.display = 'none';
                document.getElementById('setupArea').style.display = 'block';
            } catch (e) {
                document.getElementById('loader').innerText = "讀取失敗，請確認網路";
            }
        }

        function startQuiz() {
            const selectedLesson = document.getElementById('lessonSelect').value;
            // 過濾：課次符合 且 尚未熟練
            currentPool = allData.filter(d => d.lesson === selectedLesson && !d.mastered);
            currentPool.sort(() => Math.random() - 0.5); // 洗牌

            if (currentPool.length === 0) {
                alert("這一課已經全部練熟囉！");
                return;
            }

            document.getElementById('setupArea').style.display = 'none';
            document.getElementById('quizArea').style.display = 'block';
            nextQuestion();
        }

        function speak() {
            if (index < 0) return;
            const msg = new SpeechSynthesisUtterance(currentPool[index].bpmf);
            msg.lang = 'zh-TW'; msg.rate = 0.7;
            speechSynthesis.cancel();
            speechSynthesis.speak(msg);
        }

        function nextQuestion() {
            index++;
            if (index < currentPool.length) {
                document.getElementById('bpmf').innerText = currentPool[index].bpmf;
                document.getElementById('word').innerText = currentPool[index].word;
                document.getElementById('word').style.display = 'none';
                document.getElementById('status').innerText = `第 ${index + 1} / ${currentPool.length} 題`;
                document.getElementById('masterBtn').disabled = false;
                document.getElementById('masterBtn').innerText = "✅ 我練熟了 (不再考)";
                speak();
            } else {
                alert("本課結束！");
                location.reload();
            }
        }

        function showAnswer() {
            document.getElementById('word').style.display = 'block';
        }

        async function markAsMastered() {
            if (index < 0) return;
            const item = currentPool[index];
            const btn = document.getElementById('masterBtn');
            btn.disabled = true;
            btn.innerText = "更新中...";

            try {
                // 呼叫 GAS 寫入 Excel
                await fetch(`${GAS_URL}?action=mastered&row=${item.row}`, { mode: 'no-cors' });
                btn.innerText = "已標記！下回不出現";
            } catch (e) {
                alert("寫入失敗，請檢查網路");
                btn.disabled = false;
            }
        }

        init();
    </script>
</body>
</html>
