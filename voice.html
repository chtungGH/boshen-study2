<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>柏伸聽寫 - 語音進化版 v1.1.1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; text-align: center; padding: 20px; background-color: #f0f3f7; color: #2c3e50; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); display: inline-block; width: 95%; max-width: 400px; min-height: 300px; }
        .mic-status { margin: 10px; padding: 8px 20px; border-radius: 25px; display: inline-block; font-size: 14px; transition: 0.3s; font-weight: bold; }
        .mic-on { background: #e74c3c; color: white; animation: pulse 1.5s infinite; }
        .mic-off { background: #95a5a6; color: white; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .bopomofo { font-size: 72px; font-weight: bold; margin: 25px 0; color: #34495e; }
        .answer { font-size: 48px; color: #27ae60; margin: 10px 0; display: none; font-weight: bold; }
        button { font-size: 18px; padding: 12px; margin: 5px; cursor: pointer; border-radius: 12px; border: none; background: #3498db; color: white; width: 46%; }
        .next-btn { background: #e67e22; width: 95%; margin-top: 15px; font-weight: bold; font-size: 20px; }
        .command-hint { font-size: 13px; color: #7f8c8d; margin-top: 20px; border-top: 1px dotted #ccc; padding-top: 15px; line-height: 1.6; }
        #loader { color: #e67e22; font-weight: bold; margin-top: 50px; }
    </style>
</head>
<body>

    <div class="card">
        <div id="loader">🎙️ 語音系統初始化中...</div>
        <div id="setupArea" style="display:none;">
            <h2 style="margin-bottom:10px;">🎙️ 語音模式</h2>
            <select id="lessonSelect" style="font-size:18px; padding:10px; width:90%; margin-bottom:20px;"></select><br>
            <button onclick="startQuiz()" style="width:90%">開始練習</button>
        </div>
        <div id="quizArea" style="display:none;">
            <div class="mic-status mic-off" id="micIndicator">🎤 麥克風未啟動</div>
            <div id="status" style="font-size:14px; color:gray; margin-bottom:10px;">進度：-- / --</div>
            <div class="bopomofo" id="bpmfDisplay">---</div>
            <div class="answer" id="wordDisplay">---</div>
            <button onclick="speak()">🔊 聽讀音</button>
            <button onclick="showAnswer()">👁️ 看答案</button>
            <div style="margin:20px; font-size:18px; display: flex; justify-content: center; align-items: center; gap: 10px;">
                <input type="checkbox" id="masterCheck" style="transform:scale(1.8)"> 
                <label for="masterCheck">這題已熟練</label>
            </div>
            <button class="next-btn" onclick="handleNext()">下一題</button>
            <div class="command-hint">💡 語音指令：<b>「下一題」、「看答案」、「這題會了」</b></div>
        </div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR8h56wLvxnA4_Xr7oLo_iO8WycSoz5Mw7m9fJrIw2R6JwhGP5bvAmnPG9yOoYg9WSrnliwmA8wbXhR/pub?output=csv";
        const GAS_FIXED = "https://script.google.com/macros/s/AKfycbwLd_hDSaEN4FqumCz5_xCFIzkYc4pQsWxd6UnQFw9aFIMo_PuDMfi2CPfKaXI1rWbpoA/exec";

        let allData = [], currentPool = [], index = -1, preferredVoice = null;
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = SpeechRecognition ? new SpeechRecognition() : null;
        if (recognition) {
            recognition.lang = 'zh-TW';
            recognition.continuous = true; 
            recognition.interimResults = false;
        }

        function loadVoices() {
            const voices = window.speechSynthesis.getVoices();
            preferredVoice = voices.find(v => v.name.includes("Google") && v.lang.includes("zh-TW")) ||
                             voices.find(v => v.name.includes("Hanhan")) ||
                             voices.find(v => v.lang.includes("zh-TW"));
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;

        async function init() {
            try {
                const response = await fetch(`${CSV_URL}&cb=${Date.now()}`);
                const dataText = await response.text();
                const rows = dataText.split(/\r?\n/).filter(r => r.trim() !== "");
                allData = rows.slice(1).map((line, i) => {
                    const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return { row: i + 2, lesson: (cols[0]||"").trim(), word: (cols[1]||"").trim(), bpmf: (cols[2]||"").trim(), mastered: (cols[3]||"").trim()==='是' };
                }).filter(item => item.word);
                const lessons = [...new Set(allData.map(d => d.lesson))];
                const select = document.getElementById('lessonSelect');
                lessons.forEach(l => {
                    const opt = document.createElement('option');
                    opt.value = opt.textContent = l;
                    select.appendChild(opt);
                });
                document.getElementById('loader').style.display = 'none';
                document.getElementById('setupArea').style.display = 'block';
                loadVoices();
            } catch (err) { document.getElementById('loader').innerText = "連線失敗"; }
        }

        function startQuiz() {
            const selectedLesson = document.getElementById('lessonSelect').value;
            currentPool = allData.filter(d => d.lesson === selectedLesson && !d.mastered);
            currentPool.sort(() => Math.random() - 0.5);
            if (currentPool.length === 0) return alert("都練熟囉！");
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
            if (recognition) {
                try {
                    recognition.start();
                    const mic = document.getElementById('micIndicator');
                    recognition.onstart = () => { mic.innerText = "🔴 指令監聽中..."; mic.className = "mic-status mic-on"; };
                    recognition.onend = () => { recognition.start(); };
                    recognition.onresult = (event) => {
                        const result = event.results[event.results.length - 1][0].transcript;
                        processVoiceCommand(result);
                    };
                } catch (e) {}
            }
            document.getElementById('setupArea').style.display = 'none';
            document.getElementById('quizArea').style.display = 'block';
            index = -1;
            showNext();
        }

        function processVoiceCommand(cmd) {
            if (cmd.includes("下一題")) { handleNext(); }
            else if (cmd.includes("答案")) { showAnswer(); }
            else if (cmd.includes("會了") || cmd.includes("熟了")) {
                document.getElementById('masterCheck').checked = true;
                setTimeout(handleNext, 600);
            }
        }

        function speak() {
            if (index < 0) return;
            window.speechSynthesis.cancel();
            setTimeout(() => {
                const utterance = new SpeechSynthesisUtterance(currentPool[index].bpmf);
                if (preferredVoice) utterance.voice = preferredVoice;
                utterance.lang = 'zh-TW';
                utterance.rate = 0.8; // 同步 v1.3.1 的語速
                window.speechSynthesis.speak(utterance);
            }, 50);
        }

        function showNext() {
            index++;
            if (index < currentPool.length) {
                document.getElementById('bpmfDisplay').innerText = currentPool[index].bpmf;
                document.getElementById('wordDisplay').innerText = currentPool[index].word;
                document.getElementById('wordDisplay').style.display = 'none';
                document.getElementById('status').innerText = `進度：${index + 1} / ${currentPool.length}`;
                document.getElementById('masterCheck').checked = false;
                speak();
            } else { alert("練習完成！"); location.reload(); }
        }

        function handleNext() {
            if (document.getElementById('masterCheck').checked) {
                fetch(`${GAS_FIXED}?action=mastered&row=${currentPool[index].row}`, { mode: 'no-cors' });
            }
            showNext();
        }

        function showAnswer() { document.getElementById('wordDisplay').style.display = 'block'; }
        window.onload = init;
    </script>
</body>
</html>
